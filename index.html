                // بازیابی پاسخ قبلی در صورت وجود
                currentSelectedOption = userAnswers[quizData[currentQuestionIndex].id] || null;
                render();
            } else {
                endQuiz();
            }
        };

        window.prevQuizQuestion = function() {
            if (currentQuestionIndex > 0) {
                // ثبت پاسخ فعلی قبل از برگشت
                userAnswers[quizData[currentQuestionIndex].id] = currentSelectedOption;
                
                currentQuestionIndex--;
                currentSelectedOption = userAnswers[quizData[currentQuestionIndex].id] || null;
                render();
            }
        };

        window.startReview = function() {
            appState = 'review';
            reviewIndex = 0;
            render();
        };

        window.nextReviewQuestion = function() {
            if (reviewIndex < totalQuestions - 1) {
                reviewIndex++;
                render();
            }
        };

        window.prevReviewQuestion = function() {
            if (reviewIndex > 0) {
                reviewIndex--;
                render();
            }
        };

        window.endReview = function() {
            appState = 'results';
            render();
        };

        // --- شروع اولیه برنامه ---
        render();

    </script>
</body>
</html>
